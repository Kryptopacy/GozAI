name: gozai
description: "AI-powered accessibility copilot for low-vision patients"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: any
  cloud_firestore: any

  # Audio (mic capture + playback)
  record: any
  just_audio: any

  # Camera
  camera: any

  # WebSocket for Gemini Live API
  web_socket_channel: any

  # Browser APIs (for web platform audio/JS interop)
  web: any

  # ML Kit (offline OCR + Barcode scanning)
  google_mlkit_text_recognition: any
  google_mlkit_barcode_scanning: any

  # HTTP for product lookups (OpenFDA, Open Food Facts)
  http: any

  # URL Launcher for caregiver dial fallback
  url_launcher: any

  # State management
  provider: any

  # Utilities
  permission_handler: any
  vibration: any
  sensors_plus: any
  flutter_dotenv: any
  path_provider: any
  uuid: any
  cupertino_icons: any
  google_fonts: ^6.2.1
  go_router: any
  image: ^4.8.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true
  assets:
    - assets/app.env
    - assets/logos/
