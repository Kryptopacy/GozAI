steps:
  # Step 1: Build the Docker container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gozai-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gozai-backend:latest'
      - '.'
    dir: 'backend'

  # Step 2: Push image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/gozai-backend'

  # Step 3: Deploy to Cloud Run (fully managed, auto-scales to zero)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gozai-backend'
      - '--image=gcr.io/$PROJECT_ID/gozai-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=GEMINI_API_KEY=$_GEMINI_API_KEY,FIREBASE_PROJECT_ID=$PROJECT_ID'
      - '--service-account=gozai-backend@$PROJECT_ID.iam.gserviceaccount.com'

substitutions:
  _GEMINI_API_KEY: '' # Set this in Cloud Build trigger settings — never hardcode

images:
  - 'gcr.io/$PROJECT_ID/gozai-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/gozai-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
